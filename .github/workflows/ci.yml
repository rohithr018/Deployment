name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  install-backend:
    runs-on: ubuntu-latest
    name: Install Backend Dependencies
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js for Backend
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

  install-frontend:
    runs-on: ubuntu-latest
    name: Install Frontend Dependencies
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

  test-backend:
    runs-on: ubuntu-latest
    name: Backend Tests
    needs: [install-backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js for Backend
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Run Backend Tests
        run: |
          cd backend
          npm run test

  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests
    needs: [install-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm run test

  gitleaks:
    runs-on: ubuntu-latest
    name: Run Gitleaks Scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Gitleaks
        uses: zricethezav/gitleaks-action@v1.0.0
        with:
          config: '.gitleaks.toml'
          leak-detection: true

  sonarqube:
    runs-on: ubuntu-latest
    name: Run SonarQube Scan
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SonarQube Scanner
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          projectKey: '<your-sonar-project-key>'
          organization: '<your-sonar-organization>'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
